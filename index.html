<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d6fd6" />
  <title>介護タクシー運行記録アプリ</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #eef5ff;
      --card: #ffffff;
      --line: #dbe7f7;
      --text: #1d2a3a;
      --sub: #67788f;
      --primary: #1d6fd6;
      --primary-2: #0d57b5;
      --warn: #fff8e7;
      --danger: #d64545;
      --ok: #0f9f67;
      --shadow: 0 10px 28px rgba(18, 64, 124, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f6faff 0%, var(--bg) 100%);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 88px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 250, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px 12px;
    }
    .topbar h1 { margin: 0; font-size: 20px; }
    .topbar .sub { margin-top: 4px; color: var(--sub); font-size: 13px; }
    .page { padding: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .hero {
      background: linear-gradient(135deg, var(--primary), #5ca2ff);
      color: #fff;
      border: none;
    }
    .hero .mini { opacity: 0.9; font-size: 12px; }
    .hero .sum { font-size: 30px; font-weight: 800; margin-top: 6px; }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .section-title h2 { margin: 0; font-size: 17px; }
    .muted { color: var(--sub); font-size: 13px; }
    .ride {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fbfdff;
    }
    .ride-head, .row, .between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .ride-head { margin-bottom: 8px; }
    .ride .name { font-weight: 700; }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #e9f2ff;
      color: var(--primary-2);
      margin-right: 6px;
      margin-top: 6px;
    }
    .total { font-weight: 800; font-size: 18px; }
    button, .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button.secondary, .btn.secondary {
      background: #edf4ff;
      color: var(--primary-2);
      border: 1px solid #cfe0f6;
    }
    button.ghost { background: transparent; color: var(--primary-2); border: 1px solid #cfe0f6; }
    button.danger { background: var(--danger); }
    .mini-btn { width: auto; padding: 8px 10px; font-size: 13px; border-radius: 10px; }
    .fab {
      position: fixed;
      right: 18px;
      bottom: 88px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 32px;
      line-height: 1;
      box-shadow: 0 14px 30px rgba(29, 111, 214, 0.4);
      z-index: 20;
    }
    .tabs {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      z-index: 30;
    }
    .tab {
      text-align: center;
      color: var(--sub);
      font-size: 12px;
      background: transparent;
      border: none;
      padding: 8px 6px;
      border-radius: 12px;
    }
    .tab.active { background: #eaf3ff; color: var(--primary-2); font-weight: 700; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #cfe0f6;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      margin-bottom: 12px;
    }
    textarea { min-height: 86px; resize: vertical; }
    .hint {
      font-size: 12px;
      color: var(--sub);
      margin-top: -6px;
      margin-bottom: 10px;
    }
    .sum-box {
      background: var(--warn);
      border: 1px solid #f3df9c;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .sum-box strong { font-size: 22px; }
    .notice {
      background: #fff9ea;
      border: 1px solid #ffe2a8;
      color: #7a5a09;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .hidden { display: none !important; }
    .sheet, .overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
    }
    .overlay {
      background: rgba(13, 31, 54, 0.38);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
    }
    .overlay.show { display: flex; }
    .sheet-body {
      background: #fff;
      width: 100%;
      max-width: 720px;
      max-height: 92vh;
      overflow: auto;
      border-radius: 24px 24px 0 0;
      padding: 16px;
      box-shadow: 0 -10px 30px rgba(0,0,0,.15);
    }
    .center-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .pin-dots { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #a9c6eb; }
    .pin-dot.filled { background: var(--primary); border-color: var(--primary); }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .keypad button { font-size: 22px; padding: 16px; border-radius: 16px; }
    .small { font-size: 12px; color: var(--sub); }
    .list-item {
      padding: 12px 0;
      border-bottom: 1px solid #eef3fb;
    }
    .list-item:last-child { border-bottom: none; }
    .pill-link { color: var(--primary-2); font-weight: 700; font-size: 13px; }
    .empty {
      text-align: center;
      padding: 24px 12px;
      color: var(--sub);
    }
    @media (min-width: 768px) {
      .page { padding: 20px; }
      .fab { right: max(18px, calc((100vw - 720px) / 2 + 18px)); }
    }
  </style>
</head>
<body>
  <div id="privacyScreen" class="center-screen hidden">
    <div class="auth-card">
      <h2 style="margin-top:0">はじめに</h2>
      <p>このアプリは、端末の中に記録を保存します。</p>
      <div class="notice">個人情報は入れすぎないようにしてください。<br>お名前は姓のみ登録がおすすめです。</div>
      <label style="display:flex; gap:8px; align-items:flex-start; font-weight:400; color:var(--text)">
        <input id="agreeCheck" type="checkbox" style="width:auto; margin:3px 0 0 0">
        <span>内容を確認しました</span>
      </label>
      <button id="agreeBtn" disabled>同意して次へ</button>
    </div>
  </div>

  <div id="passcodeSetupScreen" class="center-screen hidden">
    <div class="auth-card">
      <h2 id="setupTitle" style="margin-top:0">4桁のパスコードを決める</h2>
      <p id="setupText" class="small">あとでアプリを開く時に使います。</p>
      <div id="setupDots" class="pin-dots"></div>
      <div id="setupKeypad" class="keypad"></div>
    </div>
  </div>

  <div id="lockScreen" class="center-screen hidden">
    <div class="auth-card">
      <h2 style="margin-top:0">ロック中</h2>
      <p class="small">4桁のパスコードを入れてください。</p>
      <div id="lockDots" class="pin-dots"></div>
      <div id="lockError" class="notice hidden" style="background:#fff0f0;border-color:#ffcccc;color:#9c2b2b">パスコードが違います。</div>
      <div id="lockKeypad" class="keypad"></div>
    </div>
  </div>

  <div id="appRoot" class="app hidden">
    <div class="topbar">
      <div class="between">
        <div>
          <h1>介護タクシー運行記録</h1>
          <div class="sub" id="todayLabel"></div>
        </div>
        <button class="secondary mini-btn" id="lockBtn">🔒 ロック</button>
      </div>
    </div>

    <div id="page-home" class="page"></div>
    <div id="page-stats" class="page hidden"></div>
    <div id="page-customers" class="page hidden"></div>
    <div id="page-settings" class="page hidden"></div>

    <button class="fab" id="addRideFab">＋</button>

    <div class="tabs">
      <button class="tab active" data-tab="home">今日</button>
      <button class="tab" data-tab="stats">集計</button>
      <button class="tab" data-tab="customers">顧客</button>
      <button class="tab" data-tab="settings">設定</button>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <script>
    const WHEEL_DEFAULT = 0;
    const HIGHWAY_DEFAULT = 0;
    const storageKeys = {
      config: 'taxi_app_config_v2',
      rides: 'taxi_app_rides_v2',
      customers: 'taxi_app_customers_v2'
    };

    const state = {
      config: {
        agreed: false,
        passcode: '',
        autoDeleteYear: true,
        nameMode: 'lastname'
      },
      rides: [],
      customers: [],
      activeTab: 'home',
      setupPin: '',
      setupConfirm: '',
      lockPin: '',
      editingRideId: null,
      editingCustomerId: null,
      lastActive: Date.now()
    };

    function enc(text) {
      return btoa(unescape(encodeURIComponent(text)));
    }
    function dec(text) {
      try { return decodeURIComponent(escape(atob(text))); } catch { return ''; }
    }
    function saveConfig() { localStorage.setItem(storageKeys.config, enc(JSON.stringify(state.config))); }
    function saveRides() { localStorage.setItem(storageKeys.rides, enc(JSON.stringify(state.rides))); }
    function saveCustomers() { localStorage.setItem(storageKeys.customers, enc(JSON.stringify(state.customers))); }
    function loadAll() {
      const c = dec(localStorage.getItem(storageKeys.config) || '');
      const r = dec(localStorage.getItem(storageKeys.rides) || '');
      const m = dec(localStorage.getItem(storageKeys.customers) || '');
      if (c) state.config = { ...state.config, ...JSON.parse(c) };
      if (r) state.rides = JSON.parse(r).map(normalizeRide);
      if (m) state.customers = JSON.parse(m).map(normalizeCustomer);
    }
    function normalizeRide(r={}) {
      const ride = {
        id: r.id || uid('ride'),
        date: r.date || todayStr(),
        time: r.time || '',
        name: r.name || '',
        pickup: r.pickup || '',
        dropoff: r.dropoff || '',
        meter: num(r.meter),
        careBase: num(r.careBase),
        wheelFee: num(r.wheelFee ?? r.wheel ?? 0),
        attend: num(r.attend),
        highway: num(r.highway),
        discountType: r.discountType || (r.discount?.type || 'none'),
        discountValue: num(r.discountValue ?? r.discount?.value ?? 0),
        memo: r.memo || ''
      };
      ride.total = calcTotal(ride);
      return ride;
    }
    function normalizeCustomer(c={}) {
      return {
        id: c.id || uid('cust'),
        code: String(c.code || nextCustomerCode()),
        lastName: c.lastName || c.name || '',
        memo: c.memo || '',
        frequentPickup: c.frequentPickup || '',
        frequentDropoff: c.frequentDropoff || ''
      };
    }
    function todayStr() {
      const d = new Date();
      return d.toISOString().slice(0, 10);
    }
    function nowTime() {
      const d = new Date();
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
    function yen(n) {
      return '¥' + Number(n || 0).toLocaleString('ja-JP');
    }
    function uid(prefix='id') {
      return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    }
    function num(v) {
      const n = parseInt(v, 10);
      return Number.isFinite(n) ? n : 0;
    }
    function escapeHtml(s='') {
      return s.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }
    function calcTotal(ride) {
      const base = num(ride.meter) + num(ride.careBase) + num(ride.wheelFee) + num(ride.attend) + num(ride.highway);
      const discount = ride.discountType === 'percent'
        ? Math.floor(base * num(ride.discountValue) / 100)
        : ride.discountType === 'amount'
          ? num(ride.discountValue)
          : 0;
      return Math.max(0, base - discount);
    }
    function maybeAutoDelete() {
      if (!state.config.autoDeleteYear) return;
      const limit = new Date();
      limit.setFullYear(limit.getFullYear() - 1);
      const before = state.rides.length;
      state.rides = state.rides.filter(r => new Date(r.date) >= limit);
      if (state.rides.length !== before) saveRides();
    }
    function maskName(name) {
      if (!name) return '未登録';
      const mode = state.config.nameMode;
      if (mode === 'full') return name;
      if (mode === 'initial') return name.slice(0,1) + '.';
      if (mode === 'code') {
        const customer = state.customers.find(c => c.lastName === name || c.fullName === name);
        return customer ? '#' + customer.code : '#---';
      }
      return name;
    }
    function locationsShort(text='') {
      if (!text) return '未入力';
      return text.length > 10 ? text.slice(0, 10) + '…' : text;
    }
    function ridesToday() { return state.rides.filter(r => r.date === todayStr()).sort((a,b) => (a.time > b.time ? 1 : -1)); }
    function totalOf(list) { return list.reduce((sum, r) => sum + num(r.total), 0); }

    function renderHome() {
      const list = ridesToday();
      document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
      const html = `
        <div class="card hero">
          <div class="mini">本日の合計</div>
          <div class="sum">${yen(totalOf(list))}</div>
          <div class="mini">件数 ${list.length}件</div>
        </div>
        <div class="card">
          <div class="section-title"><h2>今日の記録</h2><span class="muted">新しい順に確認できます</span></div>
          ${list.length ? list.map(r => `
            <div class="ride" onclick="openRideForm('${r.id}')">
              <div class="ride-head">
                <div>
                  <div class="name">${escapeHtml(maskName(r.name))}</div>
                  <div class="muted">${escapeHtml(locationsShort(r.pickup))} → ${escapeHtml(locationsShort(r.dropoff))}</div>
                </div>
                <div style="text-align:right">
                  <div class="muted">${escapeHtml(r.time || '')}</div>
                  <div class="total">${yen(r.total)}</div>
                </div>
              </div>
              <div>
                ${num(r.wheelFee) ? '<span class="badge">車イス ' + yen(r.wheelFee) + '</span>' : ''}
                ${num(r.highway) ? '<span class="badge">高速 ' + yen(r.highway) + '</span>' : ''}
                ${num(r.careBase) ? '<span class="badge">介助 ' + yen(r.careBase) + '</span>' : ''}
                ${r.discountType !== 'none' ? '<span class="badge">割引あり</span>' : ''}
              </div>
            </div>`).join('') : `<div class="empty">まだ記録がありません。<br>右下の「＋」から追加できます。</div>`}
        </div>
      `;
      document.getElementById('page-home').innerHTML = html;
    }

    function renderStats() {
      const currentMonth = todayStr().slice(0,7);
      const monthRides = state.rides.filter(r => (r.date || '').slice(0,7) === currentMonth);
      const dayMap = {};
      monthRides.forEach(r => { dayMap[r.date] = (dayMap[r.date] || 0) + num(r.total); });
      const days = Object.entries(dayMap).sort((a,b) => a[0] < b[0] ? 1 : -1);
      const meter = monthRides.reduce((s,r) => s + num(r.meter), 0);
      const care = monthRides.reduce((s,r) => s + num(r.careBase), 0);
      const wheel = monthRides.reduce((s,r) => s + num(r.wheelFee), 0);
      const highway = monthRides.reduce((s,r) => s + num(r.highway), 0);
      document.getElementById('page-stats').innerHTML = `
        <div class="card">
          <div class="section-title"><h2>今月の集計</h2><span class="muted">${currentMonth.replace('-', '年')}月</span></div>
          <div class="grid-2">
            <div class="card" style="margin:0"><div class="muted">売上合計</div><div class="total">${yen(totalOf(monthRides))}</div></div>
            <div class="card" style="margin:0"><div class="muted">件数</div><div class="total">${monthRides.length}件</div></div>
          </div>
          <div class="grid-2" style="margin-top:10px">
            <div class="card" style="margin:0"><div class="muted">メーター運賃</div><div>${yen(meter)}</div></div>
            <div class="card" style="margin:0"><div class="muted">基本介助料</div><div>${yen(care)}</div></div>
            <div class="card" style="margin:0"><div class="muted">車イス料金</div><div>${yen(wheel)}</div></div>
            <div class="card" style="margin:0"><div class="muted">高速料金</div><div>${yen(highway)}</div></div>
          </div>
        </div>
        <div class="card">
          <div class="section-title"><h2>日ごとの売上</h2><span class="pill-link" onclick="exportCsv()">CSVを書き出す</span></div>
          ${days.length ? days.map(([date,total]) => `<div class="list-item between"><span>${date}</span><strong>${yen(total)}</strong></div>`).join('') : '<div class="empty">今月のデータがありません。</div>'}
        </div>
      `;
    }

    function renderCustomers() {
      document.getElementById('page-customers').innerHTML = `
        <div class="card">
          <div class="section-title"><h2>顧客マスター</h2><button class="mini-btn" onclick="openCustomerForm()">＋追加</button></div>
          <div class="notice">姓のみ登録がおすすめです。電話番号や詳しい住所は入れないでください。</div>
          ${state.customers.length ? state.customers.map(c => `
            <div class="list-item" onclick="openCustomerForm('${c.id}')">
              <div class="between"><strong>#${escapeHtml(c.code)} ${escapeHtml(c.lastName || '')}</strong><span class="muted">編集</span></div>
              <div class="muted">${escapeHtml(c.memo || 'メモなし')}</div>
              <div class="muted">${escapeHtml(c.frequentPickup || '')}${c.frequentPickup || c.frequentDropoff ? ' → ' : ''}${escapeHtml(c.frequentDropoff || '')}</div>
            </div>`).join('') : '<div class="empty">まだ顧客登録がありません。</div>'}
        </div>
      `;
    }

    function renderSettings() {
      document.getElementById('page-settings').innerHTML = `
        <div class="card">
          <div class="section-title"><h2>表示設定</h2></div>
          <label>氏名の表示</label>
          <select id="nameModeSelect" onchange="changeNameMode(this.value)">
            <option value="lastname" ${state.config.nameMode === 'lastname' ? 'selected' : ''}>姓のみ</option>
            <option value="full" ${state.config.nameMode === 'full' ? 'selected' : ''}>そのまま表示</option>
            <option value="initial" ${state.config.nameMode === 'initial' ? 'selected' : ''}>イニシャル風</option>
            <option value="code" ${state.config.nameMode === 'code' ? 'selected' : ''}>顧客コード</option>
          </select>
          <label style="display:flex; gap:8px; align-items:center; font-weight:400; color:var(--text)">
            <input type="checkbox" ${state.config.autoDeleteYear ? 'checked' : ''} style="width:auto; margin:0" onchange="toggleAutoDelete(this.checked)">
            <span>1年を過ぎたデータを自動削除</span>
          </label>
        </div>
        <div class="card">
          <div class="section-title"><h2>データ</h2></div>
          <button class="secondary" onclick="exportCsv()">CSVを書き出す</button>
          <div style="height:10px"></div>
          <button class="secondary" onclick="exportBackup()">バックアップを書き出す</button>
          <div class="hint">機種変更やキャッシュ削除に備えて、定期的な保存がおすすめです。</div>
          <input id="restoreFileInput" type="file" accept="application/json,.json" onchange="restoreBackupFile(this)" style="display:none">
          <div style="height:2px"></div>
          <button class="secondary" onclick="document.getElementById('restoreFileInput').click()">バックアップを復元する</button>
          <div class="hint">復元すると、今の記録と顧客データはバックアップ内容で置き換わります。</div>
          <div style="height:10px"></div>
          <button class="danger" onclick="clearAllData()">全データ削除</button>
        </div>
      `;
    }

    function switchTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      ['home','stats','customers','settings'].forEach(id => {
        document.getElementById('page-' + id).classList.toggle('hidden', id !== tab);
      });
      document.getElementById('addRideFab').classList.toggle('hidden', tab !== 'home');
      renderAll();
    }

    function renderAll() {
      renderHome();
      renderStats();
      renderCustomers();
      renderSettings();
    }

    function openSheet(html) {
      document.getElementById('sheetBody').innerHTML = html;
      document.getElementById('overlay').classList.add('show');
    }
    function closeSheet() {
      document.getElementById('overlay').classList.remove('show');
    }

    function rideDiscountSelect(type) {
      const field = document.getElementById('discountValueWrap');
      field.classList.toggle('hidden', type === 'none');
      calcPreviewTotal();
    }

    function fillFromCustomer(selectEl) {
      const id = selectEl.value;
      if (!id) return;
      const c = state.customers.find(x => x.id === id);
      if (!c) return;
      document.getElementById('ride-name').value = c.lastName || '';
      document.getElementById('ride-pickup').value = c.frequentPickup || '';
      document.getElementById('ride-dropoff').value = c.frequentDropoff || '';
      if (c.memo) document.getElementById('ride-memo').value = c.memo;
      calcPreviewTotal();
    }

    function openRideForm(id='') {
      const ride = state.rides.find(r => r.id === id) || {
        id: '', date: todayStr(), time: nowTime(), name:'', pickup:'', dropoff:'', meter:0, careBase:0, wheelFee:WHEEL_DEFAULT, attend:0, highway:HIGHWAY_DEFAULT,
        discountType:'none', discountValue:0, memo:'', total:0
      };
      state.editingRideId = id || null;
      openSheet(`
        <div class="section-title"><h2>${id ? '記録を編集' : '記録を追加'}</h2><button class="mini-btn ghost" onclick="closeSheet()">閉じる</button></div>
        <div class="grid-2">
          <div>
            <label>日付</label>
            <input id="ride-date" type="date" value="${escapeHtml(ride.date)}">
          </div>
          <div>
            <label>時間</label>
            <div class="grid-2" style="grid-template-columns:1fr auto; gap:8px">
              <input id="ride-time" type="time" value="${escapeHtml(ride.time)}" style="margin-bottom:0">
              <button class="secondary mini-btn" onclick="document.getElementById('ride-time').value='${nowTime()}'; calcPreviewTotal()">現在時刻</button>
            </div>
          </div>
        </div>
        <label>顧客マスターから選ぶ</label>
        <select onchange="fillFromCustomer(this)">
          <option value="">選ばない</option>
          ${state.customers.map(c => `<option value="${c.id}">#${escapeHtml(c.code)} ${escapeHtml(c.lastName || '')}</option>`).join('')}
        </select>
        <label>お名前</label>
        <input id="ride-name" placeholder="例：田中" value="${escapeHtml(ride.name)}">
        <div class="hint">姓のみがおすすめです</div>
        <label>お迎え場所</label>
        <input id="ride-pickup" placeholder="例：〇〇病院" value="${escapeHtml(ride.pickup)}">
        <label>行き先</label>
        <input id="ride-dropoff" placeholder="例：△△ホーム" value="${escapeHtml(ride.dropoff)}">
        <div class="grid-2">
          <div>
            <label>メーター運賃</label>
            <input id="ride-meter" type="number" inputmode="numeric" value="${num(ride.meter)}" oninput="calcPreviewTotal()">
          </div>
          <div>
            <label>基本介助料</label>
            <input id="ride-careBase" type="number" inputmode="numeric" value="${num(ride.careBase)}" oninput="calcPreviewTotal()">
          </div>
          <div>
            <label>車イス料金</label>
            <input id="ride-wheelFee" type="number" inputmode="numeric" value="${num(ride.wheelFee)}" oninput="calcPreviewTotal()">
          </div>
          <div>
            <label>付添料</label>
            <input id="ride-attend" type="number" inputmode="numeric" value="${num(ride.attend)}" oninput="calcPreviewTotal()">
          </div>
          <div>
            <label>高速料金</label>
            <input id="ride-highway" type="number" inputmode="numeric" value="${num(ride.highway)}" oninput="calcPreviewTotal()">
          </div>
        </div>
        <label>割引</label>
        <select id="ride-discountType" onchange="rideDiscountSelect(this.value)">
          <option value="none" ${ride.discountType==='none' ? 'selected' : ''}>なし</option>
          <option value="amount" ${ride.discountType==='amount' ? 'selected' : ''}>金額</option>
          <option value="percent" ${ride.discountType==='percent' ? 'selected' : ''}>％</option>
        </select>
        <div id="discountValueWrap" class="${ride.discountType==='none' ? 'hidden' : ''}">
          <input id="ride-discountValue" type="number" inputmode="numeric" value="${num(ride.discountValue)}" oninput="calcPreviewTotal()" placeholder="割引を入力">
        </div>
        <label>メモ</label>
        <textarea id="ride-memo" placeholder="必要なメモだけ入力">${escapeHtml(ride.memo || '')}</textarea>
        <div class="sum-box">合計 <strong id="previewTotal">${yen(calcTotal(ride))}</strong></div>
        <button onclick="saveRide()">この内容で保存</button>
        ${id ? '<div style="height:10px"></div><button class="danger" onclick="deleteRide(\'' + id + '\')">この記録を削除</button>' : ''}
      `);
      setTimeout(calcPreviewTotal, 30);
    }

    function calcPreviewTotal() {
      const ride = {
        meter: num(document.getElementById('ride-meter')?.value),
        careBase: num(document.getElementById('ride-careBase')?.value),
        wheelFee: num(document.getElementById('ride-wheelFee')?.value),
        attend: num(document.getElementById('ride-attend')?.value),
        highway: num(document.getElementById('ride-highway')?.value),
        discountType: document.getElementById('ride-discountType')?.value || 'none',
        discountValue: num(document.getElementById('ride-discountValue')?.value)
      };
      const total = calcTotal(ride);
      const el = document.getElementById('previewTotal');
      if (el) el.textContent = yen(total);
    }

    function saveRide() {
      const ride = {
        id: state.editingRideId || uid('ride'),
        date: document.getElementById('ride-date').value || todayStr(),
        time: document.getElementById('ride-time').value || nowTime(),
        name: document.getElementById('ride-name').value.trim(),
        pickup: document.getElementById('ride-pickup').value.trim(),
        dropoff: document.getElementById('ride-dropoff').value.trim(),
        meter: num(document.getElementById('ride-meter').value),
        careBase: num(document.getElementById('ride-careBase').value),
        wheelFee: num(document.getElementById('ride-wheelFee').value),
        attend: num(document.getElementById('ride-attend').value),
        highway: num(document.getElementById('ride-highway').value),
        discountType: document.getElementById('ride-discountType').value,
        discountValue: num(document.getElementById('ride-discountValue')?.value),
        memo: document.getElementById('ride-memo').value.trim()
      };
      ride.total = calcTotal(ride);
      const idx = state.rides.findIndex(r => r.id === ride.id);
      if (idx >= 0) state.rides[idx] = ride; else state.rides.push(ride);
      saveRides();
      closeSheet();
      renderAll();
    }

    function deleteRide(id) {
      if (!confirm('この記録を削除しますか？')) return;
      state.rides = state.rides.filter(r => r.id !== id);
      saveRides();
      closeSheet();
      renderAll();
    }

    function nextCustomerCode() {
      const nums = state.customers.map(c => num(c.code));
      return String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3, '0');
    }

    function openCustomerForm(id='') {
      const c = state.customers.find(x => x.id === id) || { id:'', code: nextCustomerCode(), lastName:'', memo:'', frequentPickup:'', frequentDropoff:'' };
      state.editingCustomerId = id || null;
      openSheet(`
        <div class="section-title"><h2>${id ? '顧客を編集' : '顧客を追加'}</h2><button class="mini-btn ghost" onclick="closeSheet()">閉じる</button></div>
        <label>顧客コード</label>
        <input id="cust-code" value="${escapeHtml(c.code)}">
        <label>姓</label>
        <input id="cust-lastName" value="${escapeHtml(c.lastName)}" placeholder="例：田中">
        <div class="hint">姓のみ登録がおすすめです</div>
        <label>特徴メモ</label>
        <input id="cust-memo" value="${escapeHtml(c.memo)}" placeholder="例：車イス利用あり">
        <label>よく使うお迎え場所</label>
        <input id="cust-pickup" value="${escapeHtml(c.frequentPickup)}">
        <label>よく使う行き先</label>
        <input id="cust-dropoff" value="${escapeHtml(c.frequentDropoff)}">
        <button onclick="saveCustomer()">保存</button>
        ${id ? '<div style="height:10px"></div><button class="danger" onclick="deleteCustomer(\'' + id + '\')">この顧客を削除</button>' : ''}
      `);
    }

    function saveCustomer() {
      const c = {
        id: state.editingCustomerId || uid('cust'),
        code: document.getElementById('cust-code').value.trim() || nextCustomerCode(),
        lastName: document.getElementById('cust-lastName').value.trim(),
        memo: document.getElementById('cust-memo').value.trim(),
        frequentPickup: document.getElementById('cust-pickup').value.trim(),
        frequentDropoff: document.getElementById('cust-dropoff').value.trim()
      };
      const idx = state.customers.findIndex(x => x.id === c.id);
      if (idx >= 0) state.customers[idx] = c; else state.customers.push(c);
      saveCustomers();
      closeSheet();
      renderCustomers();
    }

    function deleteCustomer(id) {
      if (!confirm('この顧客を削除しますか？')) return;
      state.customers = state.customers.filter(c => c.id !== id);
      saveCustomers();
      closeSheet();
      renderCustomers();
    }

    function changeNameMode(v) {
      state.config.nameMode = v;
      saveConfig();
      renderAll();
    }
    function toggleAutoDelete(v) {
      state.config.autoDeleteYear = v;
      saveConfig();
    }

    function isIosLike() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    async function saveBlobFile(blob, fileName, titleText='ファイル') {
      try {
        if (navigator.canShare && navigator.share) {
          const file = new File([blob], fileName, { type: blob.type || 'application/octet-stream' });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: titleText });
            return true;
          }
        }
      } catch (e) {
        // share cancelなどは次の保存方法へフォールバック
      }

      if (isIosLike()) {
        return await new Promise((resolve) => {
          try {
            const reader = new FileReader();
            reader.onloadend = () => {
              try {
                const a = document.createElement('a');
                a.href = reader.result;
                a.target = '_blank';
                a.rel = 'noopener';
                a.click();
                setTimeout(() => {
                  alert('保存画面が出ない時は、開いたページで共有ボタンから「ファイルに保存」を選んでください。');
                }, 300);
                resolve(true);
              } catch (err) {
                resolve(false);
              }
            };
            reader.readAsDataURL(blob);
          } catch (err) {
            resolve(false);
          }
        });
      }

      try {
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        return true;
      } catch (e) {
        return false;
      }
    }

    async function exportCsv() {
      if (!state.rides.length) { alert('書き出すデータがありません。'); return; }
      const ok = confirm('個人情報が入っていないか確認してから書き出してください。CSVを書き出しますか？');
      if (!ok) return;
      const header = ['日付','時間','名前','お迎え場所','行き先','メーター運賃','基本介助料','車イス料金','付添料','高速料金','割引種別','割引値','合計','メモ'];
      const rows = state.rides.map(r => [r.date,r.time,r.name,r.pickup,r.dropoff,r.meter,r.careBase,r.wheelFee,r.attend,r.highway,r.discountType,r.discountValue,r.total,r.memo]);
      const csv = [header, ...rows].map(row => row.map(v => '"' + String(v ?? '').replaceAll('"', '""') + '"').join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const saved = await saveBlobFile(blob, 'taxi_records_' + todayStr() + '.csv', 'CSV書き出し');
      if (!saved) alert('CSVの保存に失敗しました。Safariで開いて再度お試しください。');
    }

    async function exportBackup() {
      const data = {
        app: '介護タクシー運行記録アプリ',
        version: 3,
        exportedAt: new Date().toISOString(),
        config: {
          autoDeleteYear: !!state.config.autoDeleteYear,
          nameMode: state.config.nameMode || 'lastname'
        },
        rides: state.rides.map(normalizeRide),
        customers: state.customers.map(normalizeCustomer)
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8;' });
      const saved = await saveBlobFile(blob, 'taxi_backup_' + todayStr() + '.json', 'バックアップ');
      if (!saved) alert('バックアップの保存に失敗しました。Safariで開いて再度お試しください。');
    }

    function restoreBackupFile(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const raw = JSON.parse(reader.result);
          if (!raw || (!Array.isArray(raw.rides) && !Array.isArray(raw.customers))) {
            throw new Error('形式が違います');
          }
          const rideCount = Array.isArray(raw.rides) ? raw.rides.length : 0;
          const customerCount = Array.isArray(raw.customers) ? raw.customers.length : 0;
          const ok = confirm('バックアップを復元しますか？\n今あるデータは上書きされます。\n\n記録: ' + rideCount + '件\n顧客: ' + customerCount + '件');
          if (!ok) {
            input.value = '';
            return;
          }
          const safeConfig = raw.config || {};
          state.rides = (raw.rides || []).map(normalizeRide);
          state.customers = (raw.customers || []).map(normalizeCustomer);
          state.config = {
            ...state.config,
            autoDeleteYear: typeof safeConfig.autoDeleteYear === 'boolean' ? safeConfig.autoDeleteYear : state.config.autoDeleteYear,
            nameMode: safeConfig.nameMode || state.config.nameMode || 'lastname'
          };
          saveRides();
          saveCustomers();
          saveConfig();
          renderAll();
          alert('復元が完了しました。');
        } catch (e) {
          alert('バックアップの読み込みに失敗しました。\n別のファイルか、正しいJSONファイルか確認してください。');
        }
        input.value = '';
      };
      reader.readAsText(file, 'utf-8');
    }

    function clearAllData() {
      if (!confirm('全データを削除しますか？この操作は元に戻せません。')) return;
      localStorage.removeItem(storageKeys.rides);
      localStorage.removeItem(storageKeys.customers);
      state.rides = [];
      state.customers = [];
      renderAll();
    }

    function showLockScreen() {
      document.getElementById('appRoot').classList.add('hidden');
      document.getElementById('lockScreen').classList.remove('hidden');
      state.lockPin = '';
      renderPinDots('lockDots', state.lockPin.length);
      document.getElementById('lockError').classList.add('hidden');
    }
    function showApp() {
      document.getElementById('privacyScreen').classList.add('hidden');
      document.getElementById('passcodeSetupScreen').classList.add('hidden');
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('appRoot').classList.remove('hidden');
      renderAll();
    }
    function renderPinDots(id, count) {
      document.getElementById(id).innerHTML = Array.from({length:4}).map((_,i) => `<div class="pin-dot ${i < count ? 'filled' : ''}"></div>`).join('');
    }
    function buildKeypad(containerId, onPressName) {
      const wrap = document.getElementById(containerId);
      const nums = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
      wrap.innerHTML = nums.map(n => n ? `<button onclick="${onPressName}('${n}')">${n}</button>` : '<div></div>').join('');
    }
    function setupPress(key) {
      if (key === '⌫') {
        if (!state.setupConfirm) state.setupPin = state.setupPin.slice(0,-1); else state.setupConfirm = state.setupConfirm.slice(0,-1);
      } else {
        if (!state.setupConfirm && state.setupPin.length < 4) state.setupPin += key;
        else if (state.setupPin.length === 4 && state.setupConfirm.length < 4) state.setupConfirm += key;
      }
      const count = !state.setupConfirm ? state.setupPin.length : state.setupConfirm.length;
      renderPinDots('setupDots', count);
      if (state.setupPin.length === 4 && !state.setupConfirm) {
        document.getElementById('setupTitle').textContent = 'もう一度入力してください';
        document.getElementById('setupText').textContent = '確認のため同じ4桁を入力します。';
        state.setupConfirm = '';
        renderPinDots('setupDots', 0);
      } else if (state.setupPin.length === 4 && state.setupConfirm.length === 4) {
        if (state.setupPin !== state.setupConfirm) {
          alert('パスコードが一致しません。もう一度やり直してください。');
          state.setupPin = ''; state.setupConfirm = '';
          document.getElementById('setupTitle').textContent = '4桁のパスコードを決める';
          document.getElementById('setupText').textContent = 'あとでアプリを開く時に使います。';
          renderPinDots('setupDots', 0);
        } else {
          state.config.passcode = state.setupPin;
          saveConfig();
          showApp();
        }
      }
    }
    function lockPress(key) {
      if (key === '⌫') state.lockPin = state.lockPin.slice(0,-1);
      else if (state.lockPin.length < 4) state.lockPin += key;
      renderPinDots('lockDots', state.lockPin.length);
      if (state.lockPin.length === 4) {
        if (state.lockPin === state.config.passcode) {
          state.lockPin = '';
          showApp();
        } else {
          document.getElementById('lockError').classList.remove('hidden');
          state.lockPin = '';
          setTimeout(() => renderPinDots('lockDots', 0), 100);
        }
      }
    }

    function init() {
      loadAll();
      maybeAutoDelete();
      buildKeypad('setupKeypad', 'setupPress');
      buildKeypad('lockKeypad', 'lockPress');
      renderPinDots('setupDots', 0);
      renderPinDots('lockDots', 0);
      document.getElementById('agreeCheck').addEventListener('change', e => {
        document.getElementById('agreeBtn').disabled = !e.target.checked;
      });
      document.getElementById('agreeBtn').addEventListener('click', () => {
        state.config.agreed = true;
        saveConfig();
        document.getElementById('privacyScreen').classList.add('hidden');
        document.getElementById('passcodeSetupScreen').classList.remove('hidden');
      });
      document.getElementById('lockBtn').addEventListener('click', showLockScreen);
      document.getElementById('addRideFab').addEventListener('click', () => openRideForm());
      document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
      document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeSheet(); });
      document.addEventListener('visibilitychange', () => { if (document.hidden && state.config.passcode) showLockScreen(); });
      ['click','input','touchstart'].forEach(ev => document.addEventListener(ev, () => state.lastActive = Date.now(), { passive:true }));
      setInterval(() => {
        if (!document.getElementById('appRoot').classList.contains('hidden') && Date.now() - state.lastActive > 60000 && state.config.passcode) showLockScreen();
      }, 5000);
      window.addEventListener('beforeprint', () => alert('スクリーンショットや印刷の前に、個人情報が出ていないか確認してください。'));
      if (!state.config.agreed) document.getElementById('privacyScreen').classList.remove('hidden');
      else if (!state.config.passcode) document.getElementById('passcodeSetupScreen').classList.remove('hidden');
      else showLockScreen();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
    init();
  </script>
</body>
</html>
